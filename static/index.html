<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#16a34a" />
  <title>Macro Traco</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">🥩 Macro&nbsp;Traco</div>
      <nav class="tabs">
        <button class="tab active" data-screen="entry">New Entry</button>
        <button class="tab" data-screen="dashboard">Dashboard</button>
      </nav>
    </div>
  </header>

  <!-- ============ SCREEN 1: NEW FOOD ENTRY ============ -->
  <main id="screen-entry" class="screen active">
    <div class="panels">
      <!-- Main panel: data entry -->
      <section class="panel card">
        <h2>New Food Entry</h2>

        <!-- Section 1: Food Details -->
        <label class="field">
          <span class="label">Food item <em class="req">*</em></span>
          <input type="text" id="food_item" placeholder="e.g. Red Lentils" />
          <span class="error" data-for="food_item"></span>
        </label>

        <details class="details-group" id="details-group">
          <summary>More details <small>(required to add, not to compare)</small></summary>
          <div class="grid2">
            <label class="field combo">
              <span class="label">Store</span>
              <input type="text" id="store" autocomplete="off" data-field="Store" />
              <ul class="suggestions" data-for="store"></ul>
              <span class="error" data-for="store"></span>
            </label>
            <label class="field combo">
              <span class="label">Brand</span>
              <input type="text" id="brand" autocomplete="off" data-field="Brand" />
              <ul class="suggestions" data-for="brand"></ul>
              <span class="error" data-for="brand"></span>
            </label>
            <label class="field combo">
              <span class="label">Category</span>
              <input type="text" id="category" autocomplete="off" data-field="Category" />
              <ul class="suggestions" data-for="category"></ul>
              <span class="error" data-for="category"></span>
            </label>
            <label class="field combo">
              <span class="label">Form Factor</span>
              <input type="text" id="form_factor" autocomplete="off" data-field="Form Factor" />
              <ul class="suggestions" data-for="form_factor"></ul>
              <span class="error" data-for="form_factor"></span>
            </label>
            <label class="field">
              <span class="label">Date</span>
              <div class="date-row">
                <input type="text" id="date" placeholder="2026 / Pre-2026 / Oct 2024" />
                <input type="date" id="date_picker" aria-label="Pick a date" />
              </div>
              <span class="error" data-for="date"></span>
            </label>
          </div>
        </details>

        <!-- Price & Size (required to compute $/30g) -->
        <h3>Price &amp; Size</h3>
        <div class="grid2">
          <label class="field">
            <span class="label">Price ($) <em class="req">*</em></span>
            <input type="number" step="0.01" id="price" inputmode="decimal" />
            <span class="error" data-for="price"></span>
          </label>
          <label class="field">
            <span class="label">Package Size (g/mL) <em class="req">*</em></span>
            <input type="number" step="any" id="size" inputmode="decimal" />
            <span class="error" data-for="size"></span>
          </label>
        </div>

        <!-- Section 2: Macros -->
        <h3>Macronutrients (per serving)</h3>
        <div class="grid3">
          <label class="field">
            <span class="label">Serving Size (g/mL) <em class="req">*</em></span>
            <input type="number" step="any" id="serving_size" inputmode="decimal" />
            <span class="error" data-for="serving_size"></span>
          </label>
          <label class="field">
            <span class="label">Protein (g) <em class="req">*</em></span>
            <input type="number" step="any" id="protein" inputmode="decimal" />
            <span class="error" data-for="protein"></span>
          </label>
          <label class="field">
            <span class="label">Calories <em class="req">*</em></span>
            <input type="number" step="any" id="calories" inputmode="decimal" />
            <span class="error" data-for="calories"></span>
          </label>
        </div>

        <!-- Section 3: Buttons -->
        <div class="actions">
          <button class="btn secondary" id="btn-compare">Quick Compare</button>
          <button class="btn primary" id="btn-add">Add Item</button>
        </div>
        <p class="toast" id="entry-toast"></p>
      </section>

      <!-- Secondary panel: comparison -->
      <aside class="panel card compare" id="compare-panel">
        <h2>Where it ranks</h2>
        <div class="compare-empty" id="compare-empty">
          Enter the fields and tap <strong>Quick Compare</strong> to see how this
          food stacks up on <strong>$ / 30g protein</strong>.
        </div>
        <div class="compare-body hidden" id="compare-body"></div>
      </aside>
    </div>
  </main>

  <!-- ============ SCREEN 2: DASHBOARD ============ -->
  <main id="screen-dashboard" class="screen">
    <section class="card">
      <h2>Dashboard</h2>
      <div class="filters">
        <label class="field">
          <span class="label">Food item</span>
          <input type="text" id="f_food" placeholder="e.g. ground beef" />
        </label>
        <label class="field"><span class="label">Store</span><select id="f_store"></select></label>
        <label class="field"><span class="label">Brand</span><select id="f_brand"></select></label>
        <label class="field"><span class="label">Category</span><select id="f_category"></select></label>
        <label class="field"><span class="label">Form Factor</span><select id="f_form"></select></label>
        <button class="btn ghost" id="btn-reset-filters">Reset</button>
      </div>

      <div class="stat-cards" id="stat-cards"></div>

      <div class="table-wrap">
        <table id="data-table">
          <thead>
            <tr>
              <th data-sort="rank">#</th>
              <th data-sort="Food Item">Food</th>
              <th data-sort="Store">Store</th>
              <th data-sort="Brand">Brand</th>
              <th data-sort="Category">Category</th>
              <th data-sort="dollars" class="ctr">$/30g</th>
              <th data-sort="cals" class="ctr">Cal/30g</th>
              <th data-sort="Date">Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="version" id="version">v0.0.0</footer>
  <script src="/app.js"></script>
</body>
</html>
